services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
      POSTGRES_DB: phishing_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d phishing_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  servicio-auth:
    build: ./servicio-Auth
    container_name: servicio-auth
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - ./compartida:/app/compartida

  servicio-fetcher:
    build: ./servicio-Fetcher
    container_name: servicio-fetcher
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./compartida:/app/compartida
    command: ["bash", "start.sh"]

  servicio-ml:
    build: ./servicio-ML
    container_name: servicio-ml
    ports:
      - "8002:8002"
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - ./compartida:/app/compartida

  servicio-verificacion:
    build: ./servicio-Verificacion
    container_name: servicio-verificacion
    ports:
      - "8003:8003"
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - ./compartida:/app/compartida

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - servicio-fetcher
    volumes:
      - ./compartida:/app/compartida

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

volumes:
  db_data: